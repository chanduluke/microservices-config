
spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      default-filters:
        - AddRequestHeader=X-Request-Source, Gateway
      routes:
        - id: user-service
          uri: http://localhost:8083
          predicates:
            - Path=/users/**

        - id: product-service
          uri: http://localhost:8084
          predicates:
            - Path=/products/**

server:
  port: 8085   # Gateway will run on port 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

